name: Release Sitemap Guard

on:
  pull_request:
    branches:
      - release

permissions:
  contents: read

jobs:
  sitemap:
    name: Verify sitemap is up-to-date
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Regenerate sitemap
        run: pnpm generate:sitemap

      - name: Ensure sitemap committed
        run: |
          if [[ -n "$(git status --short -- public/sitemap.xml)" ]]; then
            echo "::error ::public/sitemap.xml is out of date. Run 'pnpm generate:sitemap' and commit the result."
            git status --short -- public/sitemap.xml
            exit 1
          fi
