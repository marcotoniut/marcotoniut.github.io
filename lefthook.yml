pre-commit:
  parallel: true
  commands:
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: command -v actionlint >/dev/null 2>&1 && actionlint {staged_files} || echo "actionlint not installed — run 'proto install' to enable"
    sitemap:
      run: pnpm generate:sitemap && git add public/sitemap.xml
      stage_fixed: true
    lint:
      run: pnpm lint
    typecheck:
      run: pnpm typecheck
    spellcheck:
      run: pnpm spellcheck

pre-push:
  commands:
    tests:
      run: ./bin/pre-push.sh
